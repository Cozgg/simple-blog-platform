name: Run

on:
  push:
    branches: [ test, main ]
  pull_request:
    branches: [ test, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Install Chrome and ChromeDriver
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser xvfb
        sudo rm -f /usr/bin/chromedriver

    - name: Initialize database
      env:
        DATABASE_URL: sqlite:////home/runner/work/simple-blog-platform/simple-blog-platform/blog.db
      run: |
        PYTHONPATH=. python -c "from blogapp import app, db; app.app_context().push(); db.create_all()"

    - name: Run tests
      env:
        DATABASE_URL: sqlite:////home/runner/work/simple-blog-platform/simple-blog-platform/blog.db
        PYTHONPATH: .
      run: |
        DATABASE_URL=sqlite:////home/runner/work/simple-blog-platform/simple-blog-platform/blog.db python blogapp/index.py &
        sleep 5
        xvfb-run -a pytest blogapp
