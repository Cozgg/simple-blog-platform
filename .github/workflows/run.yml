name: Run

on:
  push:
    branches: [ test, main ]
  pull_request:
    branches: [ test, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      env:
        DATABASE_URL: sqlite:///blog.db
      run: |
        PYTHONPATH=. python blogapp/seed.py
        PYTHONPATH=. python blogapp/index.py &
        sleep 5
        PYTHONPATH=. pytest blogapp
