{% extends 'layout/base.html' %}

{% block title %}Đăng nhập{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5">
    <div class="col-sm-10 col-md-7 col-lg-5 col-xl-4">

        <div class="card border-0 auth-card">
            <div class="card-body p-4 p-md-5">

                <!-- Header -->
                <div class="text-center mb-4">
                    <div class="auth-icon-wrap d-inline-flex align-items-center justify-content-center mb-3">
                        <i class="bi bi-person-fill text-white" style="font-size: 2rem;"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Đăng nhập</h3>
                    <p class="text-muted small mb-0">Chào mừng trở lại! Nhập thông tin tài khoản của bạn.</p>
                </div>

                <!-- Login form -->
                <form method="post" action="">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control rounded-3" id="username"
                               placeholder="Tên đăng nhập" name="username" required />
                        <label for="username">
                            <i class="bi bi-person me-1"></i>Tên đăng nhập
                        </label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" class="form-control rounded-3" id="pwd"
                               placeholder="Mật khẩu" name="password" required />
                        <label for="pwd">
                            <i class="bi bi-lock me-1"></i>Mật khẩu
                        </label>
                    </div>

                    <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold rounded-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
