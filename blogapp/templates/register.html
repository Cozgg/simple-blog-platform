{% extends 'layout/base.html' %}

{% block title %}Đăng ký{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-sm-11 col-md-8 col-lg-6 col-xl-5">

        <div class="card border-0 auth-card">
            <div class="card-body p-4 p-md-5">

                <!-- Header -->
                <div class="text-center mb-4">
                    <div class="auth-icon-wrap d-inline-flex align-items-center justify-content-center mb-3">
                        <i class="bi bi-person-plus-fill text-white" style="font-size: 2rem;"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Tạo tài khoản</h3>
                    <p class="text-muted small mb-0">Điền thông tin bên dưới để đăng ký tài khoản mới.</p>
                </div>

                <!-- Error message -->
                {% if err_msg %}
                <div class="alert alert-danger d-flex align-items-center gap-2 rounded-3" role="alert">
                    <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
                    <span>{{err_msg}}</span>
                </div>
                {% endif %}

                <!-- Register form -->
                <form method="post" action="/register" enctype="multipart/form-data">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control rounded-3" id="name"
                               placeholder="Họ tên" name="name" required />
                        <label for="name"><i class="bi bi-person-vcard me-1"></i>Họ tên</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control rounded-3" id="username"
                               placeholder="Tên đăng nhập" name="username" required />
                        <label for="username"><i class="bi bi-at me-1"></i>Tên đăng nhập</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control rounded-3" id="email"
                               placeholder="Email" name="email" required />
                        <label for="email"><i class="bi bi-envelope me-1"></i>Email</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control rounded-3" id="pwd"
                               placeholder="Mật khẩu" name="password" required />
                        <label for="pwd"><i class="bi bi-lock me-1"></i>Mật khẩu</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control rounded-3" id="confirm"
                               placeholder="Xác nhận mật khẩu" name="confirm" required />
                        <label for="confirm"><i class="bi bi-lock-fill me-1"></i>Xác nhận mật khẩu</label>
                    </div>

                    <div class="mb-4">
                        <label for="avatar" class="avatar-upload-label d-block mb-2">
                            <i class="bi bi-image me-1"></i>Ảnh đại diện
                        </label>
                        <input type="file" class="form-control rounded-3" id="avatar"
                               name="avatar" required accept="image/*" />
                    </div>

                    <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold rounded-3">
                        <i class="bi bi-person-check-fill me-2"></i>Đăng ký
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
